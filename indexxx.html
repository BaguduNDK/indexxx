<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 550px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }

    h1 {
      color: #333;
    }

    p {
      color: gray;
      font-size: 14px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 9px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 9px 16px;
      font-size: 15px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 25px;
    }

    li {
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    li span {
      flex: 1;
      font-size: 15px;
    }

    li.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    .delete-btn {
      background: #e74c3c;
      padding: 5px 10px;
      font-size: 13px;
      border-radius: 4px;
    }

    .delete-btn:hover {
      background: #c0392b;
    }

    .empty-msg {
      color: gray;
      font-size: 14px;
      margin-top: 20px;
    }

    .clear-btn {
      margin-top: 15px;
      background: #888;
      font-size: 13px;
      padding: 7px 14px;
    }

    .clear-btn:hover {
      background: #666;
    }
  </style>
</head>
<body>

  <h1>To Do List</h1>


  <div class="input-row">
    <input type="text" id="taskInput" placeholder="Add a new task..." />
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>
  <div id="emptyMsg" class="empty-msg">No tasks yet. Add one above.</div>
  <button class="clear-btn" onclick="clearAll()" style="display:none;" id="clearBtn">Clear All</button>

  <script>
    var tasks = JSON.parse(localStorage.getItem("tasks") || "[]");

    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function renderTasks() {
      var list = document.getElementById("taskList");
      var emptyMsg = document.getElementById("emptyMsg");
      var clearBtn = document.getElementById("clearBtn");

      list.innerHTML = "";

      if (tasks.length === 0) {
        emptyMsg.style.display = "block";
        clearBtn.style.display = "none";
        return;
      }

      emptyMsg.style.display = "none";
      clearBtn.style.display = "inline-block";

      for (var i = 0; i < tasks.length; i++) {
        var li = document.createElement("li");
        if (tasks[i].done) li.classList.add("done");

        var checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = tasks[i].done;
        checkbox.dataset.index = i;
        checkbox.addEventListener("change", toggleTask);

        var span = document.createElement("span");
        span.textContent = tasks[i].text;

        var delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.className = "delete-btn";
        delBtn.dataset.index = i;
        delBtn.addEventListener("click", deleteTask);

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        list.appendChild(li);
      }
    }

    function addTask() {
      var input = document.getElementById("taskInput");
      var text = input.value.trim();

      if (text === "") return;

      tasks.push({ text: text, done: false });
      saveTasks();
      renderTasks();
      input.value = "";
    }

    function toggleTask(e) {
      var index = e.target.dataset.index;
      tasks[index].done = !tasks[index].done;
      saveTasks();
      renderTasks();
    }

    function deleteTask(e) {
      var index = e.target.dataset.index;
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    }

    function clearAll() {
      if (confirm("Delete all tasks?")) {
        tasks = [];
        saveTasks();
        renderTasks();
      }
    }

    // Enter key to add
    document.getElementById("taskInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") addTask();
    });

    // load on startup
    renderTasks();
  </script>

</body>
</html>
